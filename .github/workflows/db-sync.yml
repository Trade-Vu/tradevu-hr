name: Database — Migrate Production

on:
  # Run automatically when schema or migrations land on main
  push:
    branches: [main]
    paths:
      - 'server/prisma/schema.prisma'
      - 'server/prisma/migrations/**'

  # Manual trigger from the Actions tab (useful for emergency re-runs)
  workflow_dispatch:

# Only one migration job runs at a time — prevents race conditions
concurrency:
  group: db-migrate-production
  cancel-in-progress: false   # never cancel a running migration

jobs:
  migrate:
    name: Apply Prisma Migrations → Production
    runs-on: ubuntu-latest

    # Gate: only run after CI passes (keeps broken migrations off prod)
    # Remove this block if you want migrations to run independently of CI.
    # needs: ci-success   # uncomment if your CI workflow is in the same file

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node setup ──────────────────────────────────────────────────────
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      # ── 3. Install server deps (needed for prisma generate) ────────────────
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      # ── 4. Generate Prisma client (ensures client matches schema) ──────────
      - name: Generate Prisma client
        working-directory: ./server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: npx prisma generate

      # ── 5. Apply pending migrations (idempotent — safe to re-run) ──────────
      - name: Deploy Prisma migrations
        working-directory: ./server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: npx prisma migrate deploy

      # ── 6. Smoke-check: validate schema matches DB state ───────────────────
      - name: Validate schema drift
        working-directory: ./server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: npx prisma migrate status
