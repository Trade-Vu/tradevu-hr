name: Database — Migrate Production

on:
  # Run automatically when schema or migrations land on main
  push:
    branches: [main]
    paths:
      - 'server/prisma/schema.prisma'
      - 'server/prisma/migrations/**'

  # Manual trigger from the Actions tab (useful for emergency re-runs)
  workflow_dispatch:

# Only one migration job runs at a time — prevents race conditions
concurrency:
  group: db-migrate-production
  cancel-in-progress: false   # never cancel a running migration

jobs:
  sync:
    name: Auto-Sync Prisma Schema → Production
    runs-on: ubuntu-latest

    # Gate: only run after CI passes (keeps broken migrations off prod)
    # Remove this block if you want migrations to run independently of CI.
    # needs: ci-success   # uncomment if your CI workflow is in the same file

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node setup ──────────────────────────────────────────────────────
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      # ── 3. Install server deps (needed for prisma generate) ────────────────
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      # ── 4. Generate Prisma client (ensures client matches schema) ──────────
      - name: Generate Prisma client
        working-directory: ./server
        env:
          DATABASE_URL: 'postgresql://neondb_owner:npg_T34hqejMryOl@ep-green-dream-atkhaqfd-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require'
        run: npx prisma generate

      # ── 5. Auto-sync schema (Prisma db push for rapid iteration / Neon workflow) ──────────
      - name: Auto-sync schema to Production
        working-directory: ./server
        env:
          DATABASE_URL: 'postgresql://neondb_owner:npg_T34hqejMryOl@ep-green-dream-atkhaqfd-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require'
        run: npx prisma db push --accept-data-loss
