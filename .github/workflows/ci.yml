name: CI

on:
  push:
    branches: [main, staging, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Production-safe feature flag defaults for CI
  VITE_FEATURE_CSV_IMPORT: 'false'
  VITE_FEATURE_MOCK_CEO_LOGIN: 'false'
  VITE_FEATURE_ORG_SETUP_BYPASS: 'false'
  NODE_VERSION: '22'

jobs:
  # ─── Job 1: Lint & Typecheck ──────────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─── Job 2: Unit Tests (Vitest) ───────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ─── Job 3: Build Validation ──────────────────────────────────────────────────
  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        # .env.production is committed and Vite loads it automatically.
        # VITE_GRAPHQL_URL from the secret overrides it if the secret is set.
        # Either way, localhost must never appear in a production bundle.
        env:
          VITE_GRAPHQL_URL: ${{ secrets.VITE_GRAPHQL_URL }}
        run: |
          # Resolve the URL that will actually be baked into the bundle.
          # If the secret is empty, .env.production supplies the value.
          RESOLVED_URL="${VITE_GRAPHQL_URL:-$(grep -E '^VITE_GRAPHQL_URL=' .env.production | cut -d= -f2-)}"
          echo "Building with VITE_GRAPHQL_URL=$RESOLVED_URL"

          # Safety guard — bail if we'd accidentally bake in localhost
          if echo "$RESOLVED_URL" | grep -q 'localhost'; then
            echo "::error::VITE_GRAPHQL_URL resolves to localhost — refusing to build a production bundle with a local API URL."
            exit 1
          fi

          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─── Job 4: Critical Path E2E (Onboarding Flow) ───────────────────────────────
  e2e-critical-path:
    name: E2E — Onboarding Critical Path
    runs-on: ubuntu-latest
    needs: [unit-tests, build]
    env:
      VITE_GRAPHQL_URL: 'http://localhost:3001/graphql'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cypress — Onboarding Critical Path
        uses: cypress-io/github-action@v6
        with:
          start: npm run dev
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 60
          spec: cypress/e2e/onboarding-flow.cy.js
          browser: chrome
        env:
          CYPRESS_BASE_URL: 'http://localhost:5173'

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-onboarding
          path: cypress/screenshots/
          retention-days: 3
          if-no-files-found: ignore

  # ─── Job 5: Full E2E Suite (non-blocking on feature branches) ─────────────────
  e2e-full:
    name: E2E — Full Suite
    runs-on: ubuntu-latest
    needs: e2e-critical-path
    # Only run the full suite on main/develop, not on every feature branch push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    env:
      VITE_GRAPHQL_URL: 'http://localhost:3001/graphql'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cypress — Full Suite
        uses: cypress-io/github-action@v6
        with:
          start: npm run dev
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 60
          browser: chrome
        env:
          CYPRESS_BASE_URL: 'http://localhost:5173'

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-full
          path: cypress/screenshots/
          retention-days: 3
          if-no-files-found: ignore

  # ─── Job Summary: Gate for deployment ────────────────────────────────────────
  # This job is the single "all-green" gate that your deployment pipeline
  # should require. Add branch protection rules requiring this to pass.
  ci-success:
    name: CI — All checks passed
    runs-on: ubuntu-latest
    needs: [unit-tests, build, e2e-critical-path]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build failed"
            exit 1
          fi
          if [[ "${{ needs.e2e-critical-path.result }}" != "success" ]]; then
            echo "❌ Critical path E2E failed"
            exit 1
          fi
          echo "✅ All required checks passed — safe to deploy"
